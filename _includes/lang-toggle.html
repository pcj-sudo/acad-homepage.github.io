<!-- Language switch button. Shows the language you can switch TO. -->
<button id="lang-toggle" class="lang-toggle" type="button" aria-label="Switch language / 切换语言">
  <span class="lang-en">中文</span><span class="lang-zh">EN</span>
</button>
<script>
  (function () {
    var btn = document.getElementById('lang-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var html = document.documentElement;
      var toZh = html.classList.contains('lang-en');
      html.classList.toggle('lang-en', !toZh);
      html.classList.toggle('lang-zh', toZh);
      try { localStorage.setItem('site-lang', toZh ? 'zh' : 'en'); } catch (e) {}
    });
  })();
</script>
